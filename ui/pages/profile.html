<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料 - 品质生活</title>
  <link rel="stylesheet" href="../css/tailwind.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar-left">
      <span class="signal-icon">
        <i class="fas fa-signal"></i>
      </span>
    </div>
    <div class="status-bar-time">19:46</div>
    <div class="status-bar-right">
      <span class="wifi-icon">
        <i class="fas fa-wifi"></i>
      </span>
      <span class="battery-icon">
        <i class="fas fa-battery-three-quarters"></i> 85%
      </span>
    </div>
  </div>

  <!-- App Content -->
  <div class="app-content">
    <div class="scroll-container">
      <!-- Header -->
      <div class="bg-indigo-600 text-white">
        <div class="pt-6 pb-8 px-6">
          <h1 class="text-xl font-bold mb-6">个人资料</h1>
          
          <div class="flex items-center">
            <div class="relative">
              <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=256&q=80" 
                   alt="Profile" 
                   class="h-20 w-20 rounded-full object-cover border-2 border-white">
              <div class="absolute bottom-0 right-0 h-6 w-6 bg-white rounded-full flex items-center justify-center">
                <i class="fas fa-camera text-indigo-600 text-xs"></i>
              </div>
            </div>
            <div class="ml-4">
              <h2 class="text-lg font-semibold">李明</h2>
              <p class="text-sm opacity-80">liming@example.com</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Profile Information Sections -->
      <div class="p-4">
        <!-- Personal Information Section -->
        <div class="card p-4 mb-4">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-800">基本信息</h2>
            <a href="edit_basic_info.html" class="text-indigo-600">
              <i class="fas fa-pen"></i>
            </a>
          </div>
          
          <div class="space-y-3">
            <div class="flex justify-between">
              <span class="text-gray-600">姓名</span>
              <span class="font-medium">李明</span>
            </div>
            <div class="border-t border-gray-100"></div>
            
            <div class="flex justify-between">
              <span class="text-gray-600">年龄</span>
              <span class="font-medium">32岁</span>
            </div>
            <div class="border-t border-gray-100"></div>
            
            <div class="flex justify-between">
              <span class="text-gray-600">性别</span>
              <span class="font-medium">男</span>
            </div>
            <div class="border-t border-gray-100"></div>
            
            <div class="flex justify-between">
              <span class="text-gray-600">电话</span>
              <span class="font-medium">138****5678</span>
            </div>
          </div>
        </div>
        
        <!-- Health Information Section -->
        <div class="card p-4 mb-4">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-800">健康信息</h2>
            <a href="edit_health_info.html" class="text-indigo-600">
              <i class="fas fa-pen"></i>
            </a>
          </div>
          
          <div class="space-y-3">
            <div class="flex justify-between">
              <span class="text-gray-600">身高</span>
              <span class="font-medium">178 cm</span>
            </div>
            <div class="border-t border-gray-100"></div>
            
            <div class="flex justify-between">
              <span class="text-gray-600">体重</span>
              <span class="font-medium">72 kg</span>
            </div>
            <div class="border-t border-gray-100"></div>
            
            <div class="flex justify-between">
              <span class="text-gray-600">BMI</span>
              <span class="font-medium">22.7 <span class="text-green-600 text-xs">(健康)</span></span>
            </div>
            <div class="border-t border-gray-100"></div>
            
            <div class="flex justify-between">
              <span class="text-gray-600">血型</span>
              <span class="font-medium">O型</span>
            </div>
          </div>
        </div>
        
        <!-- Preferences Section -->
        <div class="card p-4 mb-4">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-800">偏好设置</h2>
            <button class="text-indigo-600">
              <i class="fas fa-pen"></i>
            </button>
          </div>
          
          <div class="space-y-4">
            <div>
              <h3 class="text-gray-600 mb-2">活动水平</h3>
              <div class="flex space-x-2">
                <span class="chip">久坐</span>
                <span class="chip">轻度活动</span>
                <span class="chip active">中度活动</span>
                <span class="chip">高度活动</span>
              </div>
            </div>
            
            <div>
              <h3 class="text-gray-600 mb-2">饮食偏好</h3>
              <div class="flex flex-wrap">
                <span class="chip active">均衡饮食</span>
                <span class="chip">低脂</span>
                <span class="chip">低碳水</span>
                <span class="chip active">高蛋白</span>
                <span class="chip">素食</span>
              </div>
            </div>
            
            <div>
              <h3 class="text-gray-600 mb-2">健身目标</h3>
              <div class="flex space-x-2">
                <span class="chip">减肥</span>
                <span class="chip">保持体形</span>
                <span class="chip active">增肌</span>
                <span class="chip">提高耐力</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Family Members Section -->
        <div class="card p-4 mb-4">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-800">家庭成员</h2>
            <button class="text-indigo-600">
              <i class="fas fa-plus"></i>
            </button>
          </div>
          
          <div class="space-y-3">
            <div class="flex items-center justify-between">
              <div class="flex items-center">
                <div class="h-10 w-10 rounded-full bg-pink-100 flex items-center justify-center mr-3">
                  <span class="text-pink-500 font-medium">王</span>
                </div>
                <div>
                  <h3 class="font-medium">王丽</h3>
                  <p class="text-xs text-gray-500">配偶</p>
                </div>
              </div>
              <i class="fas fa-chevron-right text-gray-400"></i>
            </div>
            <div class="border-t border-gray-100"></div>
            
            <div class="flex items-center justify-between">
              <div class="flex items-center">
                <div class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center mr-3">
                  <span class="text-blue-500 font-medium">李</span>
                </div>
                <div>
                  <h3 class="font-medium">李小明</h3>
                  <p class="text-xs text-gray-500">儿子・8岁</p>
                </div>
              </div>
              <i class="fas fa-chevron-right text-gray-400"></i>
            </div>
          </div>
        </div>
        
        <!-- Account Actions -->
        <div class="space-y-3 mb-6">
          <a href="settings.html" class="flex items-center justify-between p-4 bg-white rounded-lg shadow">
            <div class="flex items-center">
              <div class="h-8 w-8 rounded-full bg-gray-100 flex items-center justify-center mr-3">
                <i class="fas fa-cog text-gray-500"></i>
              </div>
              <span class="font-medium">设置</span>
            </div>
            <i class="fas fa-chevron-right text-gray-400"></i>
          </a>
          
          <button class="flex items-center justify-between p-4 bg-white rounded-lg shadow w-full">
            <div class="flex items-center">
              <div class="h-8 w-8 rounded-full bg-red-100 flex items-center justify-center mr-3">
                <i class="fas fa-sign-out-alt text-red-500"></i>
              </div>
              <span class="font-medium text-red-500">退出登录</span>
            </div>
            <i class="fas fa-chevron-right text-gray-400"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a href="home.html" class="tab-item">
      <div class="tab-icon"><i class="fas fa-home"></i></div>
      <div>首页</div>
    </a>
    <a href="health_dashboard.html" class="tab-item">
      <div class="tab-icon"><i class="fas fa-heartbeat"></i></div>
      <div>健康</div>
    </a>
    <a href="finance_dashboard.html" class="tab-item">
      <div class="tab-icon"><i class="fas fa-wallet"></i></div>
      <div>财务</div>
    </a>
    <a href="profile.html" class="tab-item active">
      <div class="tab-icon"><i class="fas fa-user"></i></div>
      <div>我的</div>
    </a>
  </div>
</body>
</html>
