<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑基本信息 - 品质生活</title>
  <link rel="stylesheet" href="../css/tailwind.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .form-input {
      width: 100%;
      border-radius: 0.5rem;
      border: 1px solid #e2e8f0;
      padding: 0.75rem;
      font-size: 1rem;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      background-color: #f9fafb;
    }
    .form-input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #4b5563;
      margin-bottom: 0.25rem;
    }
    .radio-group {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .radio-option input[type="radio"] {
      accent-color: #4f46e5;
    }
    .select-input {
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center;
      background-repeat: no-repeat;
      background-size: 1.5em 1.5em;
      padding-right: 2.5rem;
    }
    .date-input {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='1.5' stroke='%236b7280'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' d='M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5'/%3e%3c/svg%3e");
      background-position: right 0.5rem center;
      background-repeat: no-repeat;
      background-size: 1.5em 1.5em;
      padding-right: 2.5rem;
    }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar-left">
      <span class="signal-icon">
        <i class="fas fa-signal"></i>
      </span>
    </div>
    <div class="status-bar-time">19:46</div>
    <div class="status-bar-right">
      <span class="wifi-icon">
        <i class="fas fa-wifi"></i>
      </span>
      <span class="battery-icon">
        <i class="fas fa-battery-three-quarters"></i> 85%
      </span>
    </div>
  </div>

  <!-- App Content -->
  <div class="app-content">
    <div class="scroll-container">
      <!-- Header -->
      <div class="bg-indigo-600 text-white">
        <div class="pt-6 pb-4 px-6">
          <div class="flex items-center">
            <a href="profile.html" class="mr-4 text-white">
              <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-xl font-bold">编辑基本信息</h1>
          </div>
        </div>
      </div>

      <!-- Edit Form -->
      <div class="p-4">
        <div class="card p-4 mb-4">
          <form>
            <!-- 姓名 -->
            <div class="mb-4">
              <label for="name" class="form-label">姓名</label>
              <input type="text" id="name" name="name" class="form-input" value="李明" placeholder="请输入您的姓名">
            </div>
            
            <!-- 性别 -->
            <div class="mb-4">
              <label class="form-label">性别</label>
              <div class="radio-group">
                <label class="radio-option">
                  <input type="radio" name="gender" value="male" checked>
                  <span>男</span>
                </label>
                <label class="radio-option">
                  <input type="radio" name="gender" value="female">
                  <span>女</span>
                </label>
                <label class="radio-option">
                  <input type="radio" name="gender" value="other">
                  <span>其他</span>
                </label>
              </div>
            </div>
            
            <!-- 出生日期 -->
            <div class="mb-4">
              <label for="birthday" class="form-label">出生日期</label>
              <input type="date" id="birthday" name="birthday" class="form-input date-input" value="1993-05-15">
            </div>
            
            <!-- 联系电话 -->
            <div class="mb-4">
              <label for="phone" class="form-label">联系电话</label>
              <input type="tel" id="phone" name="phone" class="form-input" value="13812345678" placeholder="请输入您的联系电话">
            </div>
            
            <!-- 电子邮箱 -->
            <div class="mb-4">
              <label for="email" class="form-label">电子邮箱</label>
              <input type="email" id="email" name="email" class="form-input" value="liming@example.com" placeholder="请输入您的电子邮箱">
            </div>
            
            <!-- 居住地址 -->
            <div class="mb-4">
              <label for="address" class="form-label">居住地址</label>
              <input type="text" id="address" name="address" class="form-input" value="北京市朝阳区建国路88号" placeholder="请输入您的居住地址">
            </div>
            
            <!-- 职业 -->
            <div class="mb-4">
              <label for="occupation" class="form-label">职业</label>
              <input type="text" id="occupation" name="occupation" class="form-input" value="软件工程师" placeholder="请输入您的职业">
            </div>
            
            <!-- 紧急联系人 -->
            <div class="mb-4">
              <label for="emergency_contact" class="form-label">紧急联系人</label>
              <input type="text" id="emergency_contact" name="emergency_contact" class="form-input" value="张三" placeholder="请输入紧急联系人姓名">
            </div>
            
            <!-- 紧急联系电话 -->
            <div class="mb-4">
              <label for="emergency_phone" class="form-label">紧急联系电话</label>
              <input type="tel" id="emergency_phone" name="emergency_phone" class="form-input" value="13987654321" placeholder="请输入紧急联系人电话">
            </div>
            
            <!-- 个人简介 -->
            <div class="mb-4">
              <label for="bio" class="form-label">个人简介</label>
              <textarea id="bio" name="bio" class="form-input" rows="3" placeholder="请简单介绍一下自己">热爱健康生活，喜欢运动和阅读，致力于工作与生活的平衡。</textarea>
            </div>
            
            <!-- 保存按钮 -->
            <div class="flex justify-end mt-6">
              <a href="profile.html" class="mr-3 py-2 px-4 rounded-lg border border-gray-300 text-gray-700 bg-white inline-block text-center">
                取消
              </a>
              <button type="submit" class="py-2 px-6 rounded-lg bg-indigo-600 text-white font-medium">
                保存
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
