<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账 - 品质生活</title>
  <link rel="stylesheet" href="../css/tailwind.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 直接应用于记账页面头部的内联样式 */
    .expense-header {
      background: linear-gradient(to right, #f97316, #ef4444);
      color: white;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .income-header {
      background: linear-gradient(to right, #10b981, #059669);
      color: white;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .expense-balance-card, .income-balance-card {
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 1rem;
    }

    .income-category {
      transition: all 0.3s ease;
    }

    .income-category:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar-left">
      <span class="signal-icon">
        <i class="fas fa-signal"></i>
      </span>
    </div>
    <div class="status-bar-time">19:46</div>
    <div class="status-bar-right">
      <span class="wifi-icon">
        <i class="fas fa-wifi"></i>
      </span>
      <span class="battery-icon">
        <i class="fas fa-battery-three-quarters"></i> 85%
      </span>
    </div>
  </div>

  <!-- App Content -->
  <div class="app-content">
    <div class="scroll-container">
      <!-- Header -->
      <div class="expense-header">
        <div class="flex items-center mb-4">
          <a href="finance_dashboard.html" class="mr-3 text-white">
            <i class="fas fa-arrow-left"></i>
          </a>
          <h1 class="text-xl font-bold">记一笔</h1>
        </div>
        
        <div class="text-sm font-medium mb-4">记录您的收入和支出</div>
        
        <!-- Balance Summary -->
        <div class="expense-balance-card">
          <div class="flex justify-between items-center">
            <div>
              <div class="text-sm" style="color: rgba(255, 255, 255, 0.8);">当前余额</div>
              <div class="text-xl font-bold">¥5,245.75</div>
            </div>
            <div>
              <div class="text-sm" style="color: rgba(255, 255, 255, 0.8);">本月预算剩余</div>
              <div class="text-xl font-bold">¥1,755.00</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="p-4">
        <!-- Transaction Type Toggle -->
        <div class="bg-white rounded-lg shadow-sm mb-4 p-1 flex">
          <button class="flex-1 py-3 rounded-lg text-center font-medium text-red-600 bg-red-50" onclick="switchType('expense')">
            支出
          </button>
          <button class="flex-1 py-3 rounded-lg text-center font-medium text-green-600 bg-green-50" onclick="switchType('income')">
            收入
          </button>
        </div>
        
        <!-- Expense Form -->
        <div id="expense-form" class="card p-4 mb-4">
          <!-- Amount Input -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">金额</label>
            <div class="flex items-center">
              <div class="text-2xl mr-2">¥</div>
              <input type="number" class="text-3xl font-bold border-0 border-b-2 border-gray-300 w-full focus:border-orange-500 focus:ring-0 p-0" placeholder="0.00" />
            </div>
          </div>
          
          <!-- Category Selection -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-3">类别</label>
            <div class="grid grid-cols-4 gap-3">
              <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-utensils text-red-600"></i>
                </div>
                <span class="text-xs">餐饮</span>
              </div>
              
              <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-shopping-bag text-blue-600"></i>
                </div>
                <span class="text-xs">购物</span>
              </div>
              
              <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center mb-1 border-2 border-orange-500">
                  <i class="fas fa-home text-orange-600"></i>
                </div>
                <span class="text-xs font-medium text-orange-600">住房</span>
              </div>
              
              <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-car text-purple-600"></i>
                </div>
                <span class="text-xs">交通</span>
              </div>
              
              <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-film text-green-600"></i>
                </div>
                <span class="text-xs">娱乐</span>
              </div>
              
              <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-pink-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-heartbeat text-pink-600"></i>
                </div>
                <span class="text-xs">医疗</span>
              </div>
              
              <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-graduation-cap text-indigo-600"></i>
                </div>
                <span class="text-xs">教育</span>
              </div>
              
              <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-ellipsis-h text-gray-600"></i>
                </div>
                <span class="text-xs">更多</span>
              </div>
            </div>
          </div>
          
          <!-- Date Selection -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">日期</label>
            <div class="flex items-center border-b-2 border-gray-300 py-2">
              <i class="fas fa-calendar-alt text-gray-500 mr-3"></i>
              <input type="date" value="2025-04-01" class="border-0 p-0 text-gray-800 w-full focus:ring-0" />
            </div>
          </div>
          
          <!-- Account Selection -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">账户</label>
            <div class="flex items-center border-b-2 border-gray-300 py-2">
              <i class="fas fa-credit-card text-gray-500 mr-3"></i>
              <select class="border-0 p-0 text-gray-800 w-full focus:ring-0 bg-transparent">
                <option>工商银行 (¥3,245.75)</option>
                <option>支付宝 (¥1,580.00)</option>
                <option>微信钱包 (¥420.00)</option>
                <option>现金</option>
              </select>
            </div>
          </div>
          
          <!-- Merchant Input -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">商家</label>
            <div class="flex items-center border-b-2 border-gray-300 py-2">
              <i class="fas fa-store text-gray-500 mr-3"></i>
              <input type="text" placeholder="输入商家名称" class="border-0 p-0 text-gray-800 w-full focus:ring-0" />
            </div>
          </div>
          
          <!-- Notes Input -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">备注</label>
            <div class="flex items-center border-b-2 border-gray-300 py-2">
              <i class="fas fa-sticky-note text-gray-500 mr-3"></i>
              <input type="text" placeholder="添加备注" class="border-0 p-0 text-gray-800 w-full focus:ring-0" />
            </div>
          </div>
          
          <!-- Add Receipt -->
          <div class="mb-6">
            <button class="flex items-center text-orange-600 p-2">
              <i class="fas fa-receipt mr-2"></i>
              <span>添加收据照片</span>
            </button>
          </div>
          
          <!-- Family Expense Toggle -->
          <div class="flex items-center justify-between py-2 mb-4">
            <div class="flex items-center">
              <i class="fas fa-users text-gray-500 mr-3"></i>
              <span class="text-gray-800">记为家庭支出</span>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" value="" class="sr-only peer">
              <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-orange-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
            </label>
          </div>
        </div>

        <!-- Income Form -->
        <div id="income-form" class="card p-4 mb-4 hidden">
          <!-- Amount Input -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">金额</label>
            <div class="flex items-center">
              <div class="text-2xl mr-2">¥</div>
              <input type="number" class="text-3xl font-bold border-0 border-b-2 border-gray-300 w-full focus:border-green-500 focus:ring-0 p-0" placeholder="0.00" />
            </div>
          </div>
          
          <!-- Income Category Selection -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-3">收入类别</label>
            <div class="grid grid-cols-4 gap-3">
              <div class="flex flex-col items-center income-category">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-money-bill-wave text-green-600"></i>
                </div>
                <span class="text-xs">工资</span>
              </div>
              
              <div class="flex flex-col items-center income-category">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-hand-holding-usd text-blue-600"></i>
                </div>
                <span class="text-xs">奖金</span>
              </div>
              
              <div class="flex flex-col items-center income-category">
                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-chart-line text-purple-600"></i>
                </div>
                <span class="text-xs">投资</span>
              </div>
              
              <div class="flex flex-col items-center income-category">
                <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-gift text-yellow-600"></i>
                </div>
                <span class="text-xs">礼金</span>
              </div>
              
              <div class="flex flex-col items-center income-category">
                <div class="w-12 h-12 bg-pink-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-home text-pink-600"></i>
                </div>
                <span class="text-xs">房租</span>
              </div>
              
              <div class="flex flex-col items-center income-category">
                <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-briefcase text-indigo-600"></i>
                </div>
                <span class="text-xs">兼职</span>
              </div>
              
              <div class="flex flex-col items-center income-category">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-undo text-red-600"></i>
                </div>
                <span class="text-xs">退款</span>
              </div>
              
              <div class="flex flex-col items-center income-category">
                <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mb-1">
                  <i class="fas fa-ellipsis-h text-gray-600"></i>
                </div>
                <span class="text-xs">其他</span>
              </div>
            </div>
          </div>
          
          <!-- Date Selection -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">日期</label>
            <div class="flex items-center border-b-2 border-gray-300 py-2">
              <i class="fas fa-calendar-alt text-gray-500 mr-3"></i>
              <input type="date" value="2025-04-01" class="border-0 p-0 text-gray-800 w-full focus:ring-0" />
            </div>
          </div>
          
          <!-- Account Selection -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">收入账户</label>
            <div class="flex items-center border-b-2 border-gray-300 py-2">
              <i class="fas fa-credit-card text-gray-500 mr-3"></i>
              <select class="border-0 p-0 text-gray-800 w-full focus:ring-0 bg-transparent">
                <option>工商银行 (¥3,245.75)</option>
                <option>支付宝 (¥1,580.00)</option>
                <option>微信钱包 (¥420.00)</option>
                <option>现金</option>
              </select>
            </div>
          </div>
          
          <!-- Source Input -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">收入来源</label>
            <div class="flex items-center border-b-2 border-gray-300 py-2">
              <i class="fas fa-building text-gray-500 mr-3"></i>
              <input type="text" placeholder="输入收入来源" class="border-0 p-0 text-gray-800 w-full focus:ring-0" />
            </div>
          </div>
          
          <!-- Notes Input -->
          <div class="mb-6">
            <label class="block text-gray-500 text-sm mb-2">备注</label>
            <div class="flex items-center border-b-2 border-gray-300 py-2">
              <i class="fas fa-sticky-note text-gray-500 mr-3"></i>
              <input type="text" placeholder="添加备注" class="border-0 p-0 text-gray-800 w-full focus:ring-0" />
            </div>
          </div>
        </div>
        
        <!-- Amount Suggestion -->
        <div class="card p-4 mb-4">
          <h3 class="text-sm font-medium text-gray-700 mb-3">近期类似支出</h3>
          <div class="space-y-2">
            <button class="w-full flex justify-between items-center py-2 px-3 bg-gray-50 rounded-lg">
              <div class="flex items-center">
                <i class="fas fa-home text-orange-500 mr-2"></i>
                <span>房租</span>
              </div>
              <span class="font-medium">¥2,800</span>
            </button>
            
            <button class="w-full flex justify-between items-center py-2 px-3 bg-gray-50 rounded-lg">
              <div class="flex items-center">
                <i class="fas fa-home text-orange-500 mr-2"></i>
                <span>水电费</span>
              </div>
              <span class="font-medium">¥230</span>
            </button>
            
            <button class="w-full flex justify-between items-center py-2 px-3 bg-gray-50 rounded-lg">
              <div class="flex items-center">
                <i class="fas fa-home text-orange-500 mr-2"></i>
                <span>物业费</span>
              </div>
              <span class="font-medium">¥150</span>
            </button>
          </div>
        </div>
        
        <!-- Submit Button -->
        <button class="btn-primary w-full mb-6 py-4">
          保存
        </button>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a href="home.html" class="tab-item">
      <div class="tab-icon"><i class="fas fa-home"></i></div>
      <div>首页</div>
    </a>
    <a href="health_dashboard.html" class="tab-item">
      <div class="tab-icon"><i class="fas fa-heartbeat"></i></div>
      <div>健康</div>
    </a>
    <a href="finance_dashboard.html" class="tab-item active">
      <div class="tab-icon"><i class="fas fa-wallet"></i></div>
      <div>财务</div>
    </a>
    <a href="profile.html" class="tab-item">
      <div class="tab-icon"><i class="fas fa-user"></i></div>
      <div>我的</div>
    </a>
  </div>

  <script>
    function switchType(type) {
      // 隐藏所有表单
      document.getElementById('expense-form').classList.add('hidden');
      document.getElementById('income-form').classList.add('hidden');
      
      // 移除所有按钮的激活状态
      const buttons = document.querySelectorAll('.transaction-type-toggle button');
      buttons.forEach(button => {
        button.classList.remove('text-red-600', 'bg-red-50', 'text-green-600', 'bg-green-50');
        button.classList.add('text-gray-500');
      });
      
      // 显示选中的表单并激活对应的按钮
      if (type === 'expense') {
        document.getElementById('expense-form').classList.remove('hidden');
        buttons[0].classList.remove('text-gray-500');
        buttons[0].classList.add('text-red-600', 'bg-red-50');
        document.querySelector('.expense-header').classList.remove('hidden');
        document.querySelector('.income-header').classList.add('hidden');
      } else if (type === 'income') {
        document.getElementById('income-form').classList.remove('hidden');
        buttons[1].classList.remove('text-gray-500');
        buttons[1].classList.add('text-green-600', 'bg-green-50');
        document.querySelector('.expense-header').classList.add('hidden');
        document.querySelector('.income-header').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
