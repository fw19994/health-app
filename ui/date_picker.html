<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日期选择器 - 品质生活</title>
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .date-picker-header {
      background: linear-gradient(to right, #f97316, #f59e0b);
      color: white;
      padding: 1rem;
      border-radius: 1rem 1rem 0 0;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .calendar-day {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .calendar-day:hover:not(.day-disabled) {
      background-color: #f3f4f6;
    }

    .day-today {
      border: 1px dashed #f97316;
    }

    .day-selected {
      background-color: #f97316 !important;
      color: white !important;
    }

    .day-disabled {
      color: #d1d5db;
      cursor: not-allowed;
    }

    .month-year-selector {
      border-radius: 8px;
      background-color: #f8fafc;
      padding: 10px 12px;
      cursor: pointer;
      border: 1px solid #e5e7eb;
    }

    .month-year-selector:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
    }

    .weekday-label {
      color: #9ca3af;
      font-size: 12px;
      text-align: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar-left">
      <span class="signal-icon">
        <i class="fas fa-signal"></i>
      </span>
    </div>
    <div class="status-bar-time">14:30</div>
    <div class="status-bar-right">
      <span class="wifi-icon">
        <i class="fas fa-wifi"></i>
      </span>
      <span class="battery-icon">
        <i class="fas fa-battery-three-quarters"></i> 85%
      </span>
    </div>
  </div>

  <!-- App Content -->
  <div class="app-content">
    <div class="card mx-4 mt-4 rounded-xl shadow-lg overflow-hidden">
      <!-- Date Picker Header -->
      <div class="date-picker-header">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold">选择日期</h2>
          <button class="text-white" id="closeButton">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="flex items-center justify-between">
          <div class="text-xl font-semibold" id="selectedDateDisplay">2023年4月15日</div>
        </div>
      </div>

      <!-- Date Picker Body -->
      <div class="bg-white p-4">
        <!-- Month and Year Selectors -->
        <div class="flex justify-between gap-3 mb-6">
          <select class="month-year-selector flex-1" id="yearSelector">
            <option value="2023">2023年</option>
            <option value="2024">2024年</option>
            <option value="2025" selected>2025年</option>
            <option value="2026">2026年</option>
            <option value="2027">2027年</option>
          </select>
          <select class="month-year-selector flex-1" id="monthSelector">
            <option value="0">1月</option>
            <option value="1">2月</option>
            <option value="2">3月</option>
            <option value="3" selected>4月</option>
            <option value="4">5月</option>
            <option value="5">6月</option>
            <option value="6">7月</option>
            <option value="7">8月</option>
            <option value="8">9月</option>
            <option value="9">10月</option>
            <option value="10">11月</option>
            <option value="11">12月</option>
          </select>
        </div>

        <!-- Week Days Header -->
        <div class="calendar-grid mb-2">
          <div class="weekday-label">日</div>
          <div class="weekday-label">一</div>
          <div class="weekday-label">二</div>
          <div class="weekday-label">三</div>
          <div class="weekday-label">四</div>
          <div class="weekday-label">五</div>
          <div class="weekday-label">六</div>
        </div>

        <!-- Calendar Grid -->
        <div class="calendar-grid" id="calendarGrid">
          <!-- Days will be generated by JavaScript -->
        </div>

        <!-- Quick Selection Buttons -->
        <div class="flex flex-wrap gap-2 mt-6 mb-4">
          <button class="px-3 py-1 text-sm border border-gray-200 rounded-full hover:border-orange-500 hover:text-orange-500" data-quick="today">
            今天
          </button>
          <button class="px-3 py-1 text-sm border border-gray-200 rounded-full hover:border-orange-500 hover:text-orange-500" data-quick="tomorrow">
            明天
          </button>
          <button class="px-3 py-1 text-sm border border-gray-200 rounded-full hover:border-orange-500 hover:text-orange-500" data-quick="next-week">
            下周
          </button>
          <button class="px-3 py-1 text-sm border border-gray-200 rounded-full hover:border-orange-500 hover:text-orange-500" data-quick="next-month">
            下个月
          </button>
        </div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-2 gap-3 mt-6">
          <button class="py-2.5 border border-gray-300 rounded-lg font-medium text-gray-700" id="cancelButton">
            取消
          </button>
          <button class="py-2.5 bg-orange-500 text-white rounded-lg font-medium" id="confirmButton">
            确认
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize variables
      const today = new Date();
      let selectedDate = new Date(2025, 3, 15); // Default to April 15, 2025
      
      // DOM elements
      const yearSelector = document.getElementById('yearSelector');
      const monthSelector = document.getElementById('monthSelector');
      const calendarGrid = document.getElementById('calendarGrid');
      const selectedDateDisplay = document.getElementById('selectedDateDisplay');
      const confirmButton = document.getElementById('confirmButton');
      const cancelButton = document.getElementById('cancelButton');
      const closeButton = document.getElementById('closeButton');
      const quickButtons = document.querySelectorAll('[data-quick]');
      
      // Update calendar when month or year changes
      yearSelector.addEventListener('change', updateCalendar);
      monthSelector.addEventListener('change', updateCalendar);
      
      // Handle quick selection buttons
      quickButtons.forEach(button => {
        button.addEventListener('click', function() {
          const action = this.getAttribute('data-quick');
          const newDate = new Date();
          
          switch(action) {
            case 'today':
              selectedDate = new Date();
              break;
            case 'tomorrow':
              newDate.setDate(newDate.getDate() + 1);
              selectedDate = newDate;
              break;
            case 'next-week':
              newDate.setDate(newDate.getDate() + 7);
              selectedDate = newDate;
              break;
            case 'next-month':
              newDate.setMonth(newDate.getMonth() + 1);
              selectedDate = newDate;
              break;
          }
          
          // Update selectors to match new date
          yearSelector.value = selectedDate.getFullYear();
          monthSelector.value = selectedDate.getMonth();
          
          updateCalendar();
          updateSelectedDateDisplay();
        });
      });
      
      // Initialize calendar
      updateCalendar();
      updateSelectedDateDisplay();
      
      // Function to update the calendar grid
      function updateCalendar() {
        const year = parseInt(yearSelector.value);
        const month = parseInt(monthSelector.value);
        
        // Clear previous calendar
        calendarGrid.innerHTML = '';
        
        // Get first day of month and last day of month
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        
        // Add empty cells for days before first day of month
        const firstDayOfWeek = firstDay.getDay();
        for (let i = 0; i < firstDayOfWeek; i++) {
          const emptyCell = document.createElement('div');
          calendarGrid.appendChild(emptyCell);
        }
        
        // Add days of the month
        for (let day = 1; day <= lastDay.getDate(); day++) {
          const dayCell = document.createElement('div');
          dayCell.classList.add('calendar-day');
          dayCell.textContent = day;
          
          const currentDate = new Date(year, month, day);
          
          // Check if this day is today
          if (year === today.getFullYear() && 
              month === today.getMonth() && 
              day === today.getDate()) {
            dayCell.classList.add('day-today');
          }
          
          // Check if this day is selected
          if (year === selectedDate.getFullYear() && 
              month === selectedDate.getMonth() && 
              day === selectedDate.getDate()) {
            dayCell.classList.add('day-selected');
          }
          
          // Add click event to select date
          dayCell.addEventListener('click', function() {
            // Remove selected class from previously selected day
            const previouslySelected = document.querySelector('.day-selected');
            if (previouslySelected) {
              previouslySelected.classList.remove('day-selected');
            }
            
            // Add selected class to clicked day
            this.classList.add('day-selected');
            
            // Update selected date
            selectedDate = new Date(year, month, day);
            updateSelectedDateDisplay();
          });
          
          calendarGrid.appendChild(dayCell);
        }
      }
      
      // Function to update the selected date display
      function updateSelectedDateDisplay() {
        const year = selectedDate.getFullYear();
        const month = selectedDate.getMonth() + 1;
        const day = selectedDate.getDate();
        selectedDateDisplay.textContent = `${year}年${month}月${day}日`;
      }
      
      // Handle confirm and cancel buttons
      confirmButton.addEventListener('click', function() {
        // Here you would handle the date selection confirmation
        // For demo purposes, we'll just display an alert
        alert(`你选择了: ${selectedDateDisplay.textContent}`);
      });
      
      cancelButton.addEventListener('click', function() {
        // Cancel logic here
        // For demo purposes, we'll just reset to today
        selectedDate = new Date();
        yearSelector.value = selectedDate.getFullYear();
        monthSelector.value = selectedDate.getMonth();
        updateCalendar();
        updateSelectedDateDisplay();
      });
      
      closeButton.addEventListener('click', function() {
        // Close logic here
        // For demo purposes, we'll just reload the page
        alert('关闭日期选择器');
      });
    });
  </script>
</body>
</html>
